<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>

Campus Navigation

</h1>

<form action="/home"
method="POST">

<input
type="text"
name="roll"
placeholder="University Roll Number"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<select name="role">

<option>

Student

</option>

<option>

Teacher

</option>

<option>

Guest

</option>

</select>

<button>

Login

</button>

</form>

</div>

</body>

</html>
